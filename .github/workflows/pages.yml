name: Deploy GitHub Pages
on: { push: { branches: ["master"] }, workflow_dispatch: null }
permissions: { contents: read }
jobs:
  build:
    runs-on: ubuntu-latest
    concurrency: { group: "pages-build-${{ github.ref }}", cancel-in-progress: true }
    defaults: { run: { shell: pwsh } }
    steps: [
      uses: actions/checkout@v7,
      uses: kjanat/runner@master,
      uses: oven-sh/setup-bun@v2,
      run: "runner install -f build",
      { uses: kjanat/404@master, with: { directory: dist/site } },
      { uses: actions/upload-pages-artifact@v5, with: { path: dist/site } },
    ]

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: read, pages: write, id-token: write }
    concurrency: { group: pages-deploy, cancel-in-progress: false }
    environment: { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    steps: [{ uses: actions/deploy-pages@v5, id: deployment }]
